<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23ffffff'/%3E%3Crect x='7' y='8.5' width='13' height='4' rx='2' fill='%23d2774a'/%3E%3Crect x='7' y='14' width='19' height='4' rx='2' fill='%2326221f'/%3E%3Crect x='7' y='19.5' width='15' height='4' rx='2' fill='%2326221f'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Clinilytics ATS</title>
    <style>
      @keyframes rt-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot" style="font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f4f1ea;color:#6b6660">
        <div style="text-align:center">
          <div style="width:38px;height:38px;border:3px solid #e7e2d7;border-top-color:#6e9a6a;border-radius:50%;margin:0 auto 14px;animation:rt-spin 1s linear infinite"></div>
          <div style="font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#6b6660">Loading Clinilytics…</div>
        </div>
      </div>
    </div>

    <script>
      // Self-healing boot guard: if React hasn't taken over #root within 9s, the
      // page is almost always a STALE CACHED shell pointing at asset files a newer
      // deploy already replaced. Bust the cache once; if it still fails, show an
      // actionable message instead of a blank white screen.
      (function () {
        setTimeout(function () {
          if (!document.getElementById('boot')) return; // app mounted — all good
          try {
            if (!sessionStorage.getItem('rt_cachebust')) {
              sessionStorage.setItem('rt_cachebust', '1');
              location.replace(location.pathname + '?v=' + Date.now() + location.hash);
              return;
            }
          } catch (e) { /* storage blocked — fall through to message */ }
          var b = document.getElementById('boot');
          if (b) {
            b.innerHTML =
              '<div style="text-align:center;max-width:430px;padding:24px;font-family:Inter,system-ui,sans-serif;color:#1f1d1a">' +
              '<div style="font-size:17px;font-weight:600;margin-bottom:8px">Couldn’t load the app</div>' +
              '<div style="font-size:14px;color:#6b6660;line-height:1.55">This is usually a cached page. Do a <b>hard refresh</b> (Ctrl/Cmd&nbsp;+&nbsp;Shift&nbsp;+&nbsp;R), or open it in a private/incognito window.</div>' +
              '<button onclick="try{sessionStorage.removeItem(\'rt_cachebust\')}catch(e){};location.replace(location.pathname+\'?v=\'+Date.now())" style="margin-top:16px;background:#1f1d1a;color:#f4f1ea;border:0;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer">Try again</button>' +
              '</div>';
          }
        }, 9000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
