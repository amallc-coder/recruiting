<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231f43f5'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='18' font-weight='bold' fill='white' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E"
    />
    <title>Recruiting Tracker</title>
    <style>
      @keyframes rt-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      // Capture any resource-load / JS errors before the app starts, so the
      // diagnostic below can report them.
      (function () {
        window.__be = [];
        window.addEventListener('error', function (e) {
          var t = e.target || {};
          if (t.tagName === 'SCRIPT' || t.tagName === 'LINK') {
            window.__be.push('LOAD-FAIL ' + (t.src || t.href || ''));
          } else if (e.message) {
            window.__be.push('JS-ERR ' + e.message);
          }
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          window.__be.push('REJECT ' + ((e.reason && e.reason.message) || e.reason || ''));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot" style="font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#57606a;padding:16px">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid #d0d7de;border-top-color:#1f43f5;border-radius:50%;margin:0 auto 14px;animation:rt-spin 1s linear infinite"></div>
          Loading Recruiting Tracker…
        </div>
      </div>
    </div>

    <script>
      // If React hasn't taken over #root within 6s, gather a diagnostic and show
      // it on screen (we can't read the server logs, so this surfaces the cause:
      // a 404, a wrong content-type, a blocked file, or a JS error).
      (function () {
        setTimeout(function () {
          if (!document.getElementById('boot')) return; // app mounted — healthy
          var s = document.querySelector('script[type=module]');
          var url = s ? s.src : '(no module script found)';
          var errs = (window.__be || []).join('  |  ') || 'none';
          var sheets = document.styleSheets.length;
          function show(line) {
            var b = document.getElementById('boot');
            if (!b) return;
            b.innerHTML =
              '<div style="text-align:left;max-width:560px;padding:22px;font-family:system-ui,sans-serif;color:#1f2328">' +
              '<div style="font-size:17px;font-weight:600;margin-bottom:10px">App didn’t start — diagnostic</div>' +
              '<div style="font-size:13px;color:#1f2328;line-height:1.6;word-break:break-all;background:#f6f8fa;border:1px solid #d0d7de;border-radius:8px;padding:12px;font-family:ui-monospace,Menlo,Consolas,monospace">' +
              line +
              '<br>css-stylesheets: ' + sheets +
              '<br>errors: ' + errs +
              '<br>ua: ' + (navigator.userAgent || '').slice(0, 90) +
              '</div>' +
              '<div style="font-size:13px;color:#57606a;margin-top:10px">Please send this text to your administrator.</div>' +
              '<button onclick="location.reload()" style="margin-top:14px;background:#1f43f5;color:#fff;border:0;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer">Reload</button>' +
              '</div>';
          }
          fetch(url, { cache: 'no-store' })
            .then(function (r) {
              show('app-file: HTTP ' + r.status + '  ·  content-type: ' + (r.headers.get('content-type') || '(none)') + '  ·  url: ' + url);
            })
            .catch(function (err) {
              show('app-file FETCH FAILED: ' + err + '  ·  url: ' + url);
            });
        }, 6000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
